/brochure/all:
  get:
    summary: get all brochures
    description: Endpoint to get all brochures
    tags:
      - Brochure Model
    parameters:
      - name: search
        in: query
        description: keyword for search
        required: false
        schema:
          type: string
          example: design
      - name: page
        in: query
        description: page number for pagination
        required: false
        schema:
          type: number
          example: 1
      - name: limit
        in: query
        description: limit for pagination
        required: false
        schema:
          type: number
          example: 10
    responses:
      200:
        description: Success response
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: Fetched Brochures Successfully
                result:
                  type: string
                  example: []

