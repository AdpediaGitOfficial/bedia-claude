swagger: '3.0.0'

info:
  title: Workshop API
  description: API related to Workshop management
  version: 1.0.0

servers:
  - url: http://localhost:8000
    description: Local server
  - url: https://bediapottery.ae
    description: Live server

tags:
  - name: Workshop
    description: Workshop APIs

paths:
  /workshop/all:
    get:
      tags: [Workshop]
      summary: Get all active workshops
      parameters:
        - name: page
          in: query
          schema:
            type: number
            example: 1
        - name: limit
          in: query
          schema:
            type: number
            example: 10
        - name: categoryId
          in: query
          schema:
            type: string
      responses:
        200:
          description: Workshops fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkshopListResponse'

  /workshop/homepage:
    get:
      tags: [Workshop]
      summary: Get homepage workshops grouped by category
      description: Fetch workshops for homepage where category showOnHomepage is true
      responses:
        200:
          description: Homepage workshops fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Homepage workshops fetched successfully
                  result:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        layout:
                          type: string
                          example: featured
                        imageUrl:
                          type: string
                        title:
                          type: string
                        subtitle:
                          type: string
                        description:
                          type: string
                        cards:
                          type: array
                          items:
                            type: object
                            properties:
                              _id:
                                type: string
                              title:
                                type: string
                              image:
                                type: string
                              description:
                                type: string

  /workshop/adminAll:
    get:
      tags: [Workshop]
      summary: Get all workshops (Admin)
      security:
        - JWT: []
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: number
        - name: limit
          in: query
          schema:
            type: number
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        200:
          description: Admin workshops fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkshopListResponse'

  /workshop/byCategory:
    get:
      tags: [Workshop]
      summary: Get workshops by category slug
      description: Returns category details and workshops under that category
      parameters:
        - name: slug
          in: query
          required: true
          schema:
            type: string
          example: pottery

        - name: page
          in: query
          schema:
            type: number
            example: 1

        - name: limit
          in: query
          schema:
            type: number
            example: 10

        - name: search
          in: query
          schema:
            type: string
            example: beginner

      responses:
        200:
          description: Workshops fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Homepage workshops fetched successfully
                  result:
                    type: object
                    properties:
                      totalCount:
                        type: number
                        example: 5
                      category:
                        type: object
                        properties:
                          title:
                            type: string
                            example: Pottery
                          image:
                            type: string
                            example: category.jpg
                          description:
                            type: string
                          slug:
                            type: string
                            example: pottery
                      workshops:
                        type: array
                        items:
                          $ref: '#/components/schemas/Workshop'

  /workshop/bySlug/{slug}:
    get:
      tags: [Workshop]
      summary: Get single workshop by slug
      description: Fetch workshop details using workshop slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          example: pottery-on-wheel
      responses:
        200:
          description: Workshop fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Workshop fetched successfully
                  result:
                    $ref: '#/components/schemas/Workshop'

        404:
          description: Workshop not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Workshop not found

  /workshop/availability:
    post:
      tags: [Workshop]
      summary: Check workshop slot availability
      description: Check if a workshop slot is available for booking based on date and number of guests
      security:
        - JWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - workshopId
                - bookingDate
                - slotId
                - guests
              properties:
                workshopId:
                  type: string
                  example: 65f1a2b3c4d5e6f7890abc12
                bookingDate:
                  type: string
                  format: date
                  example: 2026-01-26
                slotId:
                  type: string
                  example: 65f1a2b3c4d5e6f7890slot12
                guests:
                  type: number
                  example: 4
      responses:
        200:
          description: Workshop availability checked successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Workshop availability checked successfully
                  result:
                    type: object
                    properties:
                      available:
                        type: boolean
                        example: true
                      availableCount:
                        type: number
                        example: 6
                      willBlockSlot:
                        type: boolean
                        example: false
        400:
          description: Bad request
        404:
          description: Workshop not found
