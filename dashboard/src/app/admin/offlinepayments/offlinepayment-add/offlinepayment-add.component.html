<nz-card>
    <nz-breadcrumb>
        <nz-breadcrumb-item>
          <a [routerLink]="'/dashboard/home'">
            <i nz-icon nzType="home" theme="outline"></i>
            <span>Home</span>
          </a>
        </nz-breadcrumb-item>
        <nz-breadcrumb-item>
            <a [routerLink]="'/admin/users'">
              <span>Users</span>
            </a>
        </nz-breadcrumb-item>
        <nz-breadcrumb-item>Add Offline Payment</nz-breadcrumb-item>
    </nz-breadcrumb>   
    <div class="row m-b-30">
      <div class="col-12">
        <h1 class="page-heading">Add Offline Payment</h1>
      </div>
    </div>
    <form nz-form [formGroup]="submitDataForm" class="login-form" nzLayout="vertical" (ngSubmit)="submitForm()">
        <div class="col-lg-12">
            <div class="d-md-flex">
                <div class="col-md-4 m-b-10 m-r-10">        
                    <nz-form-item>
                        <nz-form-label >Student Name</nz-form-label>
                            <label><b>{{studentName}}</b></label>                            
                    </nz-form-item>
                </div>
                <div class="col-md-4 m-b-10 m-r-10">        
                    <nz-form-item>
                        <nz-form-label nzRequired nzFor="paymentRef">Payment Reference Number</nz-form-label>
                            <input type="text" nz-input formControlName="paymentRef" placeholder="Payment Reference Number" id="paymentRef">
                    </nz-form-item>
                </div>
                <div class="col-md-4 m-b-10 m-r-10">        
                    <nz-form-item>
                        <nz-form-label nzRequired nzFor="paymentDate">Paid Date</nz-form-label>
                        <nz-date-picker
                            formControlName="paymentDate"
                            nzFormat="yyyy-MM-dd"
                            nzPlaceHolder="Select Payment Transaction Date"
                            id="paymentDate" [nzDisabledDate]="disableFutureDates" >
                        </nz-date-picker>                        
                    </nz-form-item>
                </div>
            </div>
        </div>
        <div class="col-lg-12">
            <div class="d-md-flex">  
                <div class="col-md-4 m-b-10 m-r-10">        
                    <nz-form-item>
                        <nz-form-label nzRequired nzFor="amount">Amount</nz-form-label>
                            <input type="number" nz-input formControlName="amount" placeholder="Amount" id="amount">
                    </nz-form-item>
                </div>                
                <div class="col-md-4 m-b-10 m-r-10">         
                    <nz-form-item>
                        <nz-form-label nzFor="imageUpload">Attach Image</nz-form-label>
                        <nz-form-control>
                            <input 
                                type="file" 
                                nz-input 
                                (change)="onFileChange($event)" 
                                id="imageUpload" 
                                name="imageUpload"
                                accept="image/*" >
                            <div *ngIf="imageError" class="error">{{ imageError }}</div>                           
                        </nz-form-control>
                    </nz-form-item>
                </div>
                <div class="col-md-4 m-b-10 m-r-10">  
                    <nz-form-item>
                        <nz-form-label nzFor="preview">Image Preview</nz-form-label>
                        <!-- Image Preview -->
                        <div *ngIf="imagePreviewUrl" class="image-preview">
                            <img 
                                [src]="imagePreviewUrl" 
                                alt="Image Preview" 
                                class="img-thumbnail preview-img"
                            />
                        </div>
                    </nz-form-item> 
                </div>
            </div>  
        </div>   
        <div class="col-lg-12">
            <div class="d-md-flex">                
                <div class="col-md-12 m-b-10 m-r-10">        
                    <nz-form-item>
                        <nz-form-label  nzFor="Description">Remarks</nz-form-label>
                        <textarea nz-input id="description"
                        formControlName="description"
                        class="form-control"
                        placeholder="Enter Remarks"></textarea>                        
                    </nz-form-item>
                </div>                              
            </div>
        </div>            
        <div class="col-lg-12">
            <nz-form-item>
            <nz-form-label nzRequired nzFor="packageSelection">Select Package</nz-form-label>
            
            <div class="row">
                <div 
                class="col-md-6" 
                *ngFor="let package of packages"
                >
                <nz-card
                    [nzBordered]="true"
                    [nzHoverable]="true"
                    (click)="onPackageSelect(package)"
                    [class.selected-package]="selectedPackage?._id === package._id"
                >
                    <h5>{{ package.packageName }}</h5>
                    <p>{{ package.description }}</p>
                    <div>
                        <button
                        *ngFor="let cost of package.packageCosts"
                        nz-button
                        [nzType]="selectedPackageCost?._id === cost._id ? 'primary' : 'default'"
                        (click)="onPackageCostSelect(cost, package, $event)"
                        >            
                        {{ cost.price }}
                    </button>
                    </div>
                </nz-card>
                </div>
            </div>          
            </nz-form-item>
        </div>
        <div class="d-flex align-items-center justify-content-between">    
            <div></div>       
            <nz-form-item>
                <nz-form-control>
                    <div >
                        <button nz-button class="form-button" [nzType]="'primary'">Submit</button>                        
                    </div>
                </nz-form-control>
            </nz-form-item>   
        </div> 
    </form>
  </nz-card>
